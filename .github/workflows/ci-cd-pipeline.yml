name: Travel Book CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test-backend:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Test Auth Service
        run: cd Backend/auth-service && ./mvnw clean test

      - name: Test Booking Service
        run: cd Backend/booking-service && ./mvnw clean test

      - name: Test Destination Service
        run: cd Backend/destination-service && ./mvnw clean test

      - name: Test Packages Service
        run: cd Backend/packages-service && ./mvnw clean test

      - name: Test API Gateway
        run: cd Backend/api-gateway && ./mvnw clean test

  build-backend:
    needs: test-backend
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build Auth Service
        run: cd Backend/auth-service && ./mvnw clean package -DskipTests

      - name: Build Booking Service
        run: cd Backend/booking-service && ./mvnw clean package -DskipTests

      - name: Build Destination Service
        run: cd Backend/destination-service && ./mvnw clean package -DskipTests

      - name: Build Packages Service
        run: cd Backend/packages-service && ./mvnw clean package -DskipTests

      - name: Build API Gateway
        run: cd Backend/api-gateway && ./mvnw clean package -DskipTests

  build-frontend:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: Frontend/package-lock.json

      - name: Install dependencies
        run: cd Frontend && npm ci

      - name: Build React app
        env:
          REACT_APP_API_URL: https://api.yourdomain.com
        run: cd Frontend && npm run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: Frontend/build/
          retention-days: 7

  security-scan:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'

      - name: Upload Trivy results
        uses: github/codeql-action/upload-sarif@v2
        with:
          sarif_file: 'trivy-results.sarif'
