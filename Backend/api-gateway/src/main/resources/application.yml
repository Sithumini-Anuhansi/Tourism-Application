server:
  port: 8080

spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      routes:
        - id: auth-service
          uri: http://auth-service:8081
          predicates:
            - Path=/api/auth/**

        - id: booking-service
          uri: http://booking-service:8082
          predicates:
            - Path=/bookings/**,/api/admin/bookings/**

        - id: destination-service
          uri: http://destination-service:8083
          predicates:
            - Path=/api/destinations/**,/api/admin/destinations/**

        - id: package-service
          uri: http://packages-service:8084
          predicates:
            - Path=/packages/**,/api/admin/packages/**,/admin/packages/**

management:
  endpoints:
    web:
      exposure:
        include: health,info
