services:
  mysql:
    image: mysql:8
    restart: always

    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}

    volumes:
      - mysql_data:/var/lib/mysql
      - ./mysql-init:/docker-entrypoint-initdb.d

  auth-service:
    build: ./Backend/auth-service
    restart: always

    environment:
      SPRING_PROFILES_ACTIVE: prod
      DB_URL: jdbc:mysql://mysql:3306/users_db?useSSL=false&allowPublicKeyRetrieval=true
      DB_USER: root
      DB_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}

    depends_on:
      - mysql

  booking-service:
    build: ./Backend/booking-service
    restart: always

    environment:
      SPRING_PROFILES_ACTIVE: prod
      DB_URL: jdbc:mysql://mysql:3306/bookings_db?useSSL=false&allowPublicKeyRetrieval=true
      DB_USER: root
      DB_PASSWORD: ${MYSQL_ROOT_PASSWORD}

    depends_on:
      - mysql

  destination-service:
    build: ./Backend/destination-service
    restart: always

    environment:
      SPRING_PROFILES_ACTIVE: prod
      DB_URL: jdbc:mysql://mysql:3306/destinations_db?useSSL=false&allowPublicKeyRetrieval=true
      DB_USER: root
      DB_PASSWORD: ${MYSQL_ROOT_PASSWORD}

    depends_on:
      - mysql

  packages-service:
    build: ./Backend/packages-service
    restart: always

    environment:
      SPRING_PROFILES_ACTIVE: prod
      DB_URL: jdbc:mysql://mysql:3306/packages_db?useSSL=false&allowPublicKeyRetrieval=true
      DB_USER: root
      DB_PASSWORD: ${MYSQL_ROOT_PASSWORD}

    depends_on:
      - mysql

  api-gateway:
    build: ./Backend/api-gateway
    restart: always

    ports:
      - "8080:8080"

    depends_on:
      - auth-service
      - booking-service
      - destination-service
      - packages-service

  frontend:
    build: ./Frontend
    restart: always

    ports:
      - "3000:3000"

volumes:
  mysql_data:
